<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft Yahei", sans-serif;
            background: url("https://picsum.photos/1920/1080?random=2025513") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.15), transparent 60%);
            animation: glow 8s infinite alternate ease-in-out;
            z-index: -1;
        }

        @keyframes glow {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(1.3); opacity: 0.7; }
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            padding: 60px 45px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15), 0 5px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 580px;
            width: 90%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s ease;
        }

        .card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #fff;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            margin-bottom: 28px;
            transition: all 0.5s ease;
            animation: rotate 12s linear infinite;
        }

        .avatar:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.4);
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 40px;
            margin-bottom: 12px;
            color: #2d3748;
            font-weight: bold;
        }

        .title {
            font-size: 19px;
            color: #667eea;
            margin-bottom: 18px;
            font-weight: 500;
        }

        .info {
            font-size: 16px;
            color: #555;
            margin-bottom: 10px;
            transition: all 0.2s;
        }

        .info:hover {
            color: #667eea;
            transform: scale(1.05);
        }

        p {
            font-size: 17px;
            line-height: 1.9;
            color: #555;
            margin: 24px 0 36px 0;
        }

        .contact {
            display: flex;
            gap: 18px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .contact a {
            padding: 14px 26px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            color: white;
            font-size: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .wechat {
            background: linear-gradient(135deg, #07c160, #00d869);
        }

        .qqmail {
            background: linear-gradient(135deg, #12b7f5, #30c8ff);
        }

        .contact a:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
        }
    </style>
</head>

<body>
    <div class="card">
        <img class="avatar" src="https://picsum.photos/200/200" alt="头像">
        <h1>我的个人主页</h1>
        <div class="title">公网已发布 ✨ 永久可访问</div>

        <div class="info">🎂 生日：2002年5月13日</div>
        <div class="info">💬 微信：fate1124m</div>
        <div class="info">💙 QQ：2893759064</div>

        <p>永远相信美好的事情即将发生！</p>

        <div class="contact">
            <!-- 微信按钮：跳转到微信开放平台（也可替换为你的微信二维码图片链接） -->
            <a href="https://weixin.qq.com" class="wechat" target="_blank">📩 微信联系我</a>
            <a href="https://mail.qq.com" class="qqmail" target="_blank">📧 QQ邮箱联系我</a>
        </div>
    </div>
</body>
</html>
